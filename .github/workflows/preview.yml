name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: pnpm install

      - name: Build with PR basePath
        if: github.event.action != 'closed'
        run: pnpm build
        env:
          BASE_PATH: /pr-preview/pr-${{ github.event.number }}

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./out
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto  # deploy on open/sync, remove on close
          token: ${{ secrets.GITHUB_TOKEN }}
